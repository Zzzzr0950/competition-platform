{% extends "base.html" %}
{% block title %}修改密码 - 竞享成果{% endblock %}
{% block content %}
<div class="page-header">
    <a href="javascript:history.back()" class="page-back">&lt;</a>
    <h1 class="page-title">修改密码</h1>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label class="form-label" for="old_password">原密码</label>
            <input type="password" class="form-input" id="old_password" name="old_password" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="new_password">新密码（至少6位）</label>
            <input type="password" class="form-input" id="new_password" name="new_password" required minlength="6">
        </div>
        <div class="form-group">
            <label class="form-label" for="confirm_password">确认新密码</label>
            <input type="password" class="form-input" id="confirm_password" name="confirm_password" required minlength="6">
        </div>
        <div class="form-group">
            <label class="form-label" for="qq">QQ（选填）</label>
            <input type="text" class="form-input" id="qq" name="qq" value="{{ user.qq or '' }}" placeholder="选填">
        </div>
        <div class="form-group">
            <label class="form-label" for="phone">手机号 <span class="required">*</span></label>
            <input type="text" class="form-input" id="phone" name="phone" value="{{ user.phone or '' }}" required placeholder="请输入手机号">
        </div>
        <button type="submit" class="btn btn-primary">修改密码</button>
    </form>
</div>
{% endblock %}
