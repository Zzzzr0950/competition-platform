{% extends "base.html" %}
{% block title %}错误 - 竞享成果{% endblock %}
{% block content %}
<div class="error-page">
    <div class="error-code">{{ code }}</div>
    <p class="error-message">{{ message }}</p>
    <a href="{{ url_for('student.dashboard') if session.user_id else url_for('auth.login') }}" class="btn btn-primary" style="display:inline-flex;width:auto;padding-left:32px;padding-right:32px;">
        返回首页
    </a>
</div>
{% endblock %}
